services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: gotryl
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: gotryl
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gotryl"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: infra/Dockerfile.api
      target: migrate
    environment:
      DATABASE_URL: postgresql://gotryl:${POSTGRES_PASSWORD}@postgres:5432/gotryl
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  api:
    build:
      context: .
      dockerfile: infra/Dockerfile.api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://gotryl:${POSTGRES_PASSWORD}@postgres:5432/gotryl
      REDIS_URL: redis://redis:6379
      EXECUTOR_URL: http://executor:8000
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
      GITHUB_APP_ID: ${GITHUB_APP_ID:-}
      GITHUB_APP_PRIVATE_KEY: ${GITHUB_APP_PRIVATE_KEY:-}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}
      PORT: 3001
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  executor:
    build:
      context: .
      dockerfile: infra/Dockerfile.executor
    restart: unless-stopped
    environment:
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      R2_BUCKET: ${R2_BUCKET}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_ENDPOINT: ${R2_ENDPOINT}
      PORT: 8000

  dashboard:
    build:
      context: .
      dockerfile: infra/Dockerfile.dashboard
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: https://api.${DOMAIN}
      PORT: 3000
    depends_on:
      - api

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN}
    depends_on:
      - api
      - dashboard

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
